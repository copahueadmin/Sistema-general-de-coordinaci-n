<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Hotel Copahue</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1c2f24;--navy2:#233828;--navy3:#2e4a39;--teal:#1d7a6b;--teal2:#27b59d;--sand:#f4f0e8;--sand2:#ede6d8;--sand3:#c8b89a;--white:#fff;--text:#15151f;--text2:#3a4456;--text3:#5e6b7e;--border:#e2ddd4;--r:8px;--r2:12px;--r3:16px;--red:#a32d2d;--red2:#fcebeb;--amber:#854f0b;--amber2:#faeeda;--green:#3b6d11;--green2:#eaf3de}
html,body{font-family:'DM Sans',sans-serif;color:var(--text);font-size:13px;line-height:1.5;height:100%;overflow:hidden;letter-spacing:.2px}
body{background:linear-gradient(160deg,#eef0f1 0%,#dcdfe2 45%,#c4c8cc 80%,#b6bbc0 100%);background-attachment:fixed;position:relative}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 18% 22%,rgba(45,94,69,.14),transparent 42%),radial-gradient(circle at 82% 12%,rgba(29,122,107,.12),transparent 40%),radial-gradient(circle at 70% 85%,rgba(133,79,11,.08),transparent 45%)}

/* SELECTOR */
.sel-screen{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 28% 18%,rgba(241,231,210,.92),rgba(241,231,210,0) 55%),linear-gradient(150deg,#efe6d2 0%,#e8d9b9 34%,#dcbf84 62%,#caa54f 84%,#b88f38 100%);padding:20px;gap:0}
.sel-logo{display:flex;align-items:center;justify-content:center;margin-bottom:52px;background:none}.sel-logo img{width:210px;max-width:64vw;height:auto;display:block;filter:drop-shadow(0 3px 10px rgba(120,90,20,.18))}
.sel-sub{font-size:13px;color:#6b5a32;letter-spacing:.5px;margin-bottom:40px;text-align:center}
.sel-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.sel-card{background:rgba(8,20,16,.42);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.28);border-radius:18px;padding:28px 22px;cursor:pointer;text-align:center;width:185px;transition:all .2s;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 8px 24px rgba(0,0,0,.25)}
.sel-card:hover{background:rgba(255,255,255,.18);transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.3)}
.sel-card.on{background:rgba(255,255,255,.22);border-color:#c9a04a;box-shadow:0 0 0 3px rgba(156,125,46,.4)}
.sel-card i{font-size:42px;display:block;margin-bottom:12px}
.sel-card .sel-emoji{font-size:40px;line-height:1;display:block;margin-bottom:12px}
.sel-card h3{font-size:16px;font-weight:500;margin-bottom:4px}
.sel-card p{font-size:11px;opacity:.7}
.sel-names{margin-top:24px;text-align:center}
.sel-names h4{color:#5a4a22;font-size:14px;font-weight:500;margin-bottom:12px}
.sel-names-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.sel-name{padding:10px 18px;border-radius:20px;background:rgba(8,20,16,.42);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.28);color:#fff;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);transition:all .15s}
.sel-name:hover,.sel-name.on{background:#9c7d2e;border-color:#c9a04a}
.sel-enter{margin-top:24px;padding:14px 44px;background:#9c7d2e;border:none;border-radius:30px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;display:none}
.sel-enter.show{display:block}
.sel-enter:hover{background:#7a5f1f;transform:translateY(-2px)}

/* RECEPCIÓN LAYOUT */
.rec{display:flex;height:100vh;overflow:hidden}
.sb{width:212px;background:linear-gradient(180deg,#aacdb4,#6fa57f);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--navy3)}
.sb-logo h1{font-family:'Playfair Display',serif;font-size:13px;color:#fff}
.sb-logo span{font-size:9px;color:var(--sand3);display:block;margin-top:1px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-grp{font-size:9px;color:var(--navy3);text-transform:uppercase;letter-spacing:1.4px;padding:10px 14px 3px;font-weight:500}
.nb{display:flex;align-items:center;gap:8px;padding:8px 14px;color:#9ab4cc;cursor:pointer;font-size:11px;border-left:2px solid transparent;transition:all .12s;white-space:nowrap}
.nb:hover{color:#fff;background:var(--navy2)}
.nb.on{color:#fff;background:var(--navy2);border-left-color:#5dcaa5}
.nb i{font-size:15px;flex-shrink:0}
.nb-n{margin-left:auto;background:#ef4444;color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;min-width:16px;text-align:center}
.sb-foot{padding:10px 14px;border-top:1px solid var(--navy3);cursor:pointer;color:var(--sand3);font-size:11px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.sb-foot:hover{color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-family:'Playfair Display',serif;font-size:14px;font-weight:500}
.content{flex:1;overflow-y:auto;padding:14px 18px}

/* BUTTONS */
.btn{padding:6px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--text);display:inline-flex;align-items:center;gap:4px;transition:all .12s}
.btn:hover{background:var(--sand);border-color:var(--sand3)}
.btn-p{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-p:hover{background:var(--teal2)}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-g{background:transparent;border-color:transparent;padding:3px 6px}
.btn-g:hover{background:var(--sand);border-color:var(--border)}
.btn-d{color:var(--red)}
.btn-d:hover{background:var(--red2);border-color:#f09595}
.btns{display:flex;gap:6px;align-items:center}

/* CARDS & STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:12px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px}
.sc-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:flex;align-items:center;gap:3px}
.sc-n{font-size:20px;font-family:'Playfair Display',serif}
.sc-s{font-size:9px;color:var(--text3)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;margin-bottom:9px}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:7px 11px}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.leg-d{width:11px;height:11px;border-radius:3px;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.note-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r);padding:8px 10px;font-size:11px;color:#854f0b;margin-bottom:10px;display:flex;gap:6px;align-items:flex-start}
.note-red{background:var(--red2);border-color:#f09595;color:var(--red)}

/* FLOOR / FILTER */
.ftabs{display:flex;margin-bottom:10px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.ft{padding:5px 12px;font-size:11px;cursor:pointer;color:var(--text2);border-right:1px solid var(--border);transition:all .12s}
.ft:last-child{border-right:none}
.ft.on{background:var(--navy);color:#fff}
.ft:hover:not(.on){background:var(--sand)}
.fbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fb{padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:10px;color:var(--text2);transition:all .12s}
.fb.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.fl-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px;font-weight:500}

/* ROOMS GRID */
.rg{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;min-width:0}
.rc{border-radius:var(--r);padding:8px 9px;cursor:pointer;border:1.5px solid rgba(0,0,0,.07);position:relative;transition:all .14s}
.rc:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.08)}
.rc.limpio-hoy{background:#dce8f5;border-color:#9ab4cc}
.rc.limpio-dias{background:#e8ecf0;border-color:#c0c8d0}
.rc.sucio{background:#fff;border-color:#d1c9bb}
.rc.sin-reserva{background:#f3f4f6;border-color:#d1d5db}
.rc.reservado{background:#fee2e2;border-color:#fca5a5}
.rc.en-proceso{background:#fffbeb;border-color:#fcd34d}
.rc.blancos-prog{background:#f5f0ff;border-color:#c084fc}
.rc.blancos-libre{background:#d1fae5;border-color:#6ee7b7}
.rc-n{font-size:16px;font-family:'Playfair Display',serif;font-weight:500;line-height:1;margin-bottom:2px}
.rc-c{font-size:8px;color:var(--text3);text-transform:uppercase;margin-bottom:3px;min-height:11px}
.dots{display:flex;gap:2px}
.dot{width:6px;height:6px;border-radius:50%;border:1px solid rgba(0,0,0,.12)}
.dot.done{background:var(--teal)}
.dot.todo{background:#e2ddd4}
.rc-pax{position:absolute;top:5px;right:6px;font-size:9px;color:var(--text3)}
.rc-flag{position:absolute;bottom:5px;right:6px;width:6px;height:6px;border-radius:50%;background:#ef4444}
.rc-prio{position:absolute;top:5px;left:5px;width:7px;height:7px;border-radius:50%}
.rc-mu{font-size:8px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* AREAS */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px;margin-bottom:12px}
.ac{border-radius:var(--r);padding:8px 10px;cursor:pointer;border:1px solid var(--border);background:var(--white);transition:all .12s}
.ac:hover{transform:translateY(-1px)}
.ac.limpio-hoy{background:#dce8f5;border-color:#9ab4cc}
.ac.sucio{background:#fff;border-color:#d1c9bb}
.ac.en-proceso{background:#fffbeb;border-color:#fcd34d}
.ac.sin-reserva{background:#f3f4f6;border-color:#d1d5db}
.ac.limpio-dias{background:#e8ecf0;border-color:#c0c8d0}

/* BLANCOS */
.bl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px}
.bl-room{width:50px;height:50px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:500;flex-shrink:0;color:#fff}
.bl-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:500;margin-top:4px}
.bl-espera{background:#f5f0ff;color:#7c3aed}
.bl-libre{background:#d1fae5;color:#065f46}
.bl-done{background:#e8ecf0;color:#4a5568}

/* ISSUES */
.iss-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.iss-room{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:13px;font-weight:500;flex-shrink:0;color:#fff}
.badge{display:inline-flex;padding:2px 6px;border-radius:10px;font-size:9px;font-weight:500;margin-left:5px}
.b-urg{background:var(--red2);color:var(--red)}
.b-nor{background:var(--amber2);color:var(--amber)}
.b-ok{background:var(--green2);color:var(--green)}

/* CONSERJERIA */
.cons-e{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:7px}
.cons-h{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cons-av{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.cons-msg{font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap}

/* VG TABLE */
.vg{overflow-x:auto}
.vgt{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r2);overflow:hidden;border:1px solid var(--border)}
.vgt th{background:var(--navy);color:#fff;padding:7px 10px;font-size:10px;font-weight:500;text-align:left;white-space:nowrap}
.vgt td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle}
.vgt tr:last-child td{border-bottom:none}
.vgt tr:hover td{background:var(--sand)}
.e-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:500;cursor:pointer}

/* HAB DESC */
.hab-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:6px}
.hab-c{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:11px 12px}
.hcat{font-size:10px;font-weight:500;padding:2px 6px;border-radius:8px;display:inline-block;margin-bottom:5px}
.c-SUITE{background:#EEEDFE;color:#3C3489}
.c-STD{background:#dce8f5;color:#0f2744}
.c-MINI{background:#e8ecf0;color:#2d3748}
.c-ECO{background:var(--green2);color:var(--green)}
.c-DEPTO{background:var(--amber2);color:var(--amber)}

/* SEARCH */
.srch{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:20px;padding:5px 11px;margin-bottom:10px}
.srch input{border:none;outline:none;font-size:11px;background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;width:200px}

/* COLOR PICKER */
.cpick{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.co{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .12s}
.co.on{border-color:#1a1a2e;transform:scale(1.1)}

/* SYNC */
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══ MUCAMA TABLET ═══ */
.mu-app{height:100vh;display:flex;flex-direction:column;background:#f0f4f8;overflow:hidden}
.mu-hdr{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mu-hdr-n{color:#fff;font-size:20px;font-family:'Playfair Display',serif}
.mu-hdr-s{color:var(--sand3);font-size:13px;margin-top:2px;text-transform:capitalize}
.tab-exit{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}
.mu-body{flex:1;overflow-y:auto;padding:16px}
.mu-sec{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.mu-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;border-left:6px solid #cbd5e1;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.mu-card.urg{border-left-color:#ef4444}
.mu-card.nor{border-left-color:#f59e0b}
.mu-card.pue{border-left-color:#9ca3af}
.mu-card.bl-libre{border-left-color:#10b981}
.mu-card.bl-prog{border-left-color:#c084fc;opacity:.75}
.mu-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.mu-num{font-size:52px;font-family:'Playfair Display',serif;font-weight:500;line-height:1;color:var(--navy)}
.prio-pill{padding:6px 13px;border-radius:20px;font-size:14px;font-weight:500}
.pp-urg{background:#fee2e2;color:#a32d2d}
.pp-nor{background:#faeeda;color:#854f0b}
.pp-pue{background:#f3f4f6;color:#6b7280}
.pp-bl{background:#d1fae5;color:#065f46}
.pp-esp{background:#f5f0ff;color:#7c3aed}
.mu-task{font-size:22px;font-weight:500;color:var(--text);margin-bottom:8px}
.mu-note{background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r);padding:10px 13px;font-size:15px;color:#854f0b;margin-bottom:14px;line-height:1.5}
.mu-acts{display:flex;gap:10px}
.mu-btn{flex:1;padding:18px;border-radius:12px;border:none;cursor:pointer;font-size:17px;font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.mu-btn:active{transform:scale(.96)}
.mb-ok{background:#10b981;color:#fff}
.mb-ok:hover{background:#059669}
.mb-warn{background:#f59e0b;color:#fff}
.mb-warn:hover{background:#d97706}
.mb-bl{background:#7c3aed;color:#fff}
.mb-bl:hover{background:#6d28d9}
.mu-empty{text-align:center;padding:52px 20px}
.mu-empty i{font-size:56px;display:block;margin-bottom:14px;color:#cbd5e1}
.mu-empty p{font-size:18px;color:#64748b}

/* ═══ MANTENIMIENTO TABLET ═══ */
.mt-app{height:100vh;display:flex;flex-direction:column;background:#faf5eb;overflow:hidden}
.mt-hdr{background:#1a1a2e;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt-hdr-n{color:#fff;font-size:20px;font-family:'Playfair Display',serif}
.mt-body{flex:1;overflow-y:auto;padding:16px}
.mt-card{background:var(--white);border-radius:14px;padding:18px 20px;margin-bottom:10px;border-left:6px solid #cbd5e1;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.mt-card.urg{border-left-color:#ef4444}
.mt-card.nor{border-left-color:#f59e0b}
.mt-card.baj{border-left-color:#9ca3af}
.mt-card.bln{border-left-color:#7c3aed}
.mt-num{font-size:46px;font-family:'Playfair Display',serif;font-weight:500;line-height:1;color:#1a1a2e;margin-bottom:4px}
.mt-tit{font-size:20px;font-weight:500;margin-bottom:6px}
.mt-met{font-size:14px;color:var(--text3);margin-bottom:16px}
.mt-btn{padding:16px 24px;border-radius:12px;border:none;cursor:pointer;font-size:17px;font-family:'DM Sans',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:8px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.mt-btn:active{transform:scale(.97)}
.mb-res{background:#10b981;color:#fff}
.mb-res:hover{background:#059669}
.mb-nota{background:#f3f4f6;color:#374151}
.mb-nota:hover{background:#e5e7eb}
.mb-bln{background:#7c3aed;color:#fff}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(15,39,68,.55);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.mod{background:var(--white);border-radius:var(--r3);width:460px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.22)}
.mh{padding:18px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.mh h2{font-family:'Playfair Display',serif;font-size:18px}
.mh-s{font-size:11px;color:var(--text3);margin-top:2px}
.mc{padding:14px 20px 20px}
.fg{margin-bottom:12px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fl{font-size:10px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.fc{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);outline:none}
.fc:focus{border-color:var(--teal2)}
textarea.fc{resize:vertical;min-height:60px}
.mf{display:flex;gap:6px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:11px;margin-top:4px}
.tc-r{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;background:var(--sand);margin-bottom:5px;transition:all .12s}
.tc-r.done{background:var(--green2);border-color:#c0dd97}

/* ══════════ LIQUID GLASS (iOS 26) — más transparencia + movimiento ══════════ */
:root{
  --glass-bg:rgba(255,255,255,.42);
  --glass-bg2:rgba(255,255,255,.34);
  --glass-bd:rgba(255,255,255,.45);
  --glass-sh:0 10px 40px rgba(31,38,55,.10),inset 0 1px 2px rgba(255,255,255,.7),inset 0 -2px 4px rgba(255,255,255,.3);
  --glass-blur:blur(32px) saturate(210%);
  --bubble:28px;
}

/* Fondo líquido en movimiento — los halos flotan suavemente */
body::before{
  content:"";position:fixed;inset:-20%;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 18% 22%,rgba(45,94,69,.18),transparent 40%),
    radial-gradient(circle at 82% 12%,rgba(29,122,107,.16),transparent 38%),
    radial-gradient(circle at 70% 85%,rgba(133,79,11,.10),transparent 44%),
    radial-gradient(circle at 28% 78%,rgba(39,181,157,.12),transparent 40%);
  animation:liquidFloat 22s ease-in-out infinite;
}
@keyframes liquidFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(2.5%,-2%) scale(1.06)}
  50%{transform:translate(-2%,2.5%) scale(1.03)}
  75%{transform:translate(1.5%,1.5%) scale(1.07)}
}

.rec{background:transparent;position:relative;z-index:1}
.main{background:transparent}
.content{background:transparent}

/* Brillo especular que se desliza (sweep de luz líquida) */
@keyframes glassSheen{
  0%{transform:translateX(-120%) skewX(-18deg)}
  100%{transform:translateX(220%) skewX(-18deg)}
}
@keyframes liquidWobble{
  0%,100%{border-radius:20px}
  33%{border-radius:22px 19px 21px 20px}
  66%{border-radius:19px 21px 20px 22px}
}

/* Cards — vidrio translúcido con reflejo móvil */
.card{
  background:var(--glass-bg)!important;
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-bd)!important;border-radius:var(--bubble)!important;
  box-shadow:var(--glass-sh);position:relative;overflow:hidden;
  transition:transform .4s cubic-bezier(.34,1.4,.5,1),box-shadow .4s ease;
}
.card::before{
  content:"";position:absolute;top:0;left:0;width:60%;height:100%;z-index:1;pointer-events:none;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.45),transparent);
  animation:glassSheen 7s ease-in-out infinite;animation-delay:1s;
}
.card::after{
  content:"";position:absolute;top:0;left:0;right:0;height:50%;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.45),transparent);border-radius:var(--bubble) var(--bubble) 0 0;
}
.card:hover{transform:translateY(-2px);box-shadow:0 14px 42px rgba(31,38,55,.16),inset 0 1px 1px rgba(255,255,255,.7)}

/* Sidebar — vidrio oscuro translúcido */
.sb{
  background:rgba(255,255,255,.85)!important;
  backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border-right:1px solid rgba(255,255,255,.14);box-shadow:inset -1px 0 1px rgba(255,255,255,.08);
}

/* Topbar */
.topbar{
  background:rgba(255,255,255,.14)!important;
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--glass-bd)!important;box-shadow:inset 0 1px 1px rgba(255,255,255,.45);
}

/* Botones — vidrio líquido con rebote */
.btn{
  background:rgba(255,255,255,.06)!important;
  backdrop-filter:blur(10px) saturate(180%);-webkit-backdrop-filter:blur(10px) saturate(180%);
  border:1px solid rgba(255,255,255,.55)!important;border-radius:18px!important;
  box-shadow:0 1px 8px rgba(31,38,55,.06),inset 0 1px 2px rgba(255,255,255,.65),inset 0 -1px 3px rgba(255,255,255,.25),inset 0 0 12px rgba(255,255,255,.2);
  transition:all .3s cubic-bezier(.34,1.56,.5,1);position:relative;overflow:hidden;
}
.btn:hover{background:rgba(255,255,255,.5)!important;transform:translateY(-1.5px) scale(1.02);box-shadow:0 6px 18px rgba(31,38,55,.16),inset 0 1px 1px rgba(255,255,255,.7)}
.btn:active{transform:scale(.96)}
.btn-p{
  background:linear-gradient(135deg,rgba(29,122,107,.72),rgba(39,181,157,.66))!important;
  border-color:rgba(255,255,255,.35)!important;color:#fff!important;
  box-shadow:0 4px 16px rgba(29,122,107,.26),inset 0 1px 1px rgba(255,255,255,.45);
}
.btn-p:hover{background:linear-gradient(135deg,rgba(29,122,107,.9),rgba(39,181,157,.84))!important}

/* Room cards — vidrio sutil, reflejo al hover */
.rc{
  backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,.38)!important;border-radius:16px!important;
  box-shadow:0 2px 12px rgba(31,38,55,.05),inset 0 1px 1px rgba(255,255,255,.45);
  transition:all .3s cubic-bezier(.34,1.4,.5,1);
}
.rc:hover{transform:translateX(2px) scale(1.005);box-shadow:0 6px 20px rgba(31,38,55,.12),inset 0 1px 2px rgba(255,255,255,.6);filter:none}

/* Modales — fondo líquido borroso */
.ov{background:rgba(15,30,22,.32)!important;backdrop-filter:blur(12px) saturate(140%);-webkit-backdrop-filter:blur(12px) saturate(140%)}
.ov>div{
  background:rgba(255,255,255,.22)!important;
  backdrop-filter:blur(38px) saturate(210%);-webkit-backdrop-filter:blur(38px) saturate(210%);
  border:1px solid var(--glass-bd)!important;border-radius:var(--bubble)!important;box-shadow:0 24px 70px rgba(15,30,22,.22),inset 0 1px 2px rgba(255,255,255,.7);
  animation:modalPop .45s cubic-bezier(.34,1.56,.5,1);
}
@keyframes modalPop{0%{opacity:0;transform:scale(.92) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* Plan panels — vidrio */
.pp-card{
  background:var(--glass-bg2)!important;
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-bd)!important;border-radius:24px!important;box-shadow:var(--glass-sh);overflow:hidden;position:relative;
}
.pp-head{background:transparent!important}
.pp-head:hover{background:rgba(255,255,255,.22)!important}

/* Park sidebar (cocheras) */
.park-sb{
  width:360px!important;background:rgba(249,245,239,.16)!important;
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border-left:1px solid var(--glass-bd)!important;
}

/* Espacios de cochera — vidrio líquido */
.ps.pub{background:rgba(255,255,255,.42)!important;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ps.occ{background:rgba(240,223,196,.6)!important;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}

/* Filter pills */
.fb{backdrop-filter:blur(12px) saturate(160%);-webkit-backdrop-filter:blur(12px) saturate(160%);transition:all .3s cubic-bezier(.34,1.4,.5,1)}
.fb:hover{transform:translateY(-1px)}

/* Stats / legend glass */
.stats .sc,.legend{backdrop-filter:blur(14px) saturate(170%);-webkit-backdrop-filter:blur(14px) saturate(170%)}

/* Nav items — frost líquido */
.nb{transition:all .3s cubic-bezier(.34,1.4,.5,1)}
.nb:hover{backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transform:translateX(2px)}

/* Audit cards */
.audit-card{
  background:var(--glass-bg)!important;
  backdrop-filter:blur(22px) saturate(190%);-webkit-backdrop-filter:blur(22px) saturate(190%);
  border:1px solid var(--glass-bd)!important;border-radius:22px!important;box-shadow:var(--glass-sh);
  transition:all .3s cubic-bezier(.34,1.4,.5,1);
}
.audit-card:hover{transform:translateY(-2px)}

/* Tablet cards */
.mu-card,.task-card,.iss-card{backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%)}

/* Selector cards — más vidrio */
.sel-card{backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%)}

function hoyISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
// Días desde hoy hasta el domingo entrante (incl.)
function diasHastaDomingo(){
  const out=[];const base=new Date();base.setHours(0,0,0,0);
  const meses=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const mkDay=(d,sem)=>({iso:d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"),dow:d.getDay(),lbl:["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getDay()],num:d.getDate(),mes:meses[d.getMonth()],sem});
  let d=new Date(base);
  // Semana actual: desde hoy hasta el domingo
  while(true){
    out.push(mkDay(d,"Esta semana"));
    if(d.getDay()===0)break;
    d.setDate(d.getDate()+1);
    if(out.length>8)break;
  }
  // Si hoy es jueves(4) o posterior, ofrecer la semana próxima (Lun→Dom)
  const dowHoy=base.getDay();
  if(dowHoy>=4||dowHoy===0){
    // d ya está en el domingo de esta semana; avanzar al lunes próximo
    let n=new Date(d);n.setDate(n.getDate()+1);
    for(let i=0;i<7;i++){out.push(mkDay(n,"Semana próxima"));n.setDate(n.getDate()+1);}
  }
  return out;
}
// Mucamas que trabajan hoy
function muHoy(){const h=hoyISO();return D.mu.filter(m=>!m.dias||m.dias.includes(h));}
// Reset diario: marca la fecha; las mucamas con días pasados quedan filtradas naturalmente
function checkResetDiario(){
  const h=hoyISO();
  const last=lsG(K.lastDay,null);
  if(last!==h){
    lsS(K.lastDay,h);
    // Limpia días pasados de cada mucama; elimina mucamas sin días futuros
    D.mu=D.mu.map(m=>{
      if(!m.dias)return m;
      const fut=m.dias.filter(d=>d>=h);
      return {...m,dias:fut};
    }).filter(m=>!m.dias||m.dias.length>0);
    lsS(K.mu,D.mu);
  }
}

// Devuelve {L,R,C} para una habitación
function tiemposHab(num){
  if(TIEMPOS_ROOM[num])return TIEMPOS_ROOM[num];
  const d=RD[num];
  if(d&&TIEMPOS_CAT[d.cat])return TIEMPOS_CAT[d.cat];
  return {L:45,R:15,C:5};
}
// Tiempo estimado (min) de la tarea actual/asignada de una habitación
function tiempoTarea(r){
  const t=tiemposHab(r.num);
  // determina la tarea: r.tarea explícita, sino derivada del estado
  let tarea=r.tarea;
  if(!tarea||tarea==="blancos"){
    if(["sucio","reservado","blancos-prog","blancos-libre"].includes(r.estado))tarea="limpiar";
    else if(r.estado==="en-proceso")tarea="repasar";
    else tarea="controlar";
  }
  const map={limpiar:t.L,repasar:t.R,controlar:t.C};
  return map[tarea]||t.C;
}
// Minutos productivos totales del turno de una mucama (descuenta descanso vía mpH como % no productivo)
function minutosTurno(m){
  try{const[h1,m1]=m.entrada.split(":").map(Number),[h2,m2]=m.salida.split(":").map(Number);
    const bruto=(h2*60+m2)-(h1*60+m1);
    // mpH histórico era "min por hab"; ahora lo usamos como % de descanso si <=100, sino bruto completo
    return Math.max(0,bruto);
  }catch(e){return 0;}
}

  const tk={limpiar:"LIMPIEZA COMPLETA",repasar:"REPASAR",controlar:"CONTROLAR"};
  if(r.tarea&&tk[r.tarea])return tk[r.tarea];
  if(!r.tasks.L&&!r.tasks.R&&!r.tasks.C)return"LIMPIEZA COMPLETA";

  if(r.tasks.L&&r.tasks.R&&!r.tasks.C)return"CONTROLAR";
  return"LIMPIEZA COMPLETA";
}

function rSel(){
  const A=UI.rolCard;
  // Admin login/panel screens
  if(UI.adminMode==='login'){
    document.getElementById("app").innerHTML=`
    <div class="sel-screen">
      <div class="adm-box">
        <h2 style="margin-bottom:4px">Administraci\u00f3n</h2>
        <p style="font-size:12px;color:#6b5a32;margin-bottom:18px">Ingres\u00e1 usuario y clave</p>
        <input id="adm-user" class="adm-inp" placeholder="Usuario" value="${(UI.admU||'').replace(/"/g,'&quot;')}" oninput="UI.admU=this.value">
        <input id="adm-pass" class="adm-inp" type="password" placeholder="Clave" value="${(UI.admP||'').replace(/"/g,'&quot;')}" oninput="UI.admP=this.value">
        ${UI.admErr?`<div style="color:#b91c1c;font-size:12px;margin-top:8px">${UI.admErr}</div>`:''}
        <div style="display:flex;gap:10px;margin-top:18px;justify-content:center">
          <button class="sel-enter show" style="margin-top:0;background:#9c7d2e" onclick="adminCheck()">Entrar</button>
          <button class="sel-enter show" style="margin-top:0;background:transparent;border:1px solid #9c7d2e;color:#6b5a32" onclick="adminClose()">Cancelar</button>
        </div>
      </div>
    </div>`;
    setTimeout(()=>{var e=document.getElementById('adm-user');if(e)e.focus();},50);
    return;
  }
  if(UI.adminMode==='hub'){
    document.getElementById("app").innerHTML=`
    <div class="sel-screen">
      <button class="adm-btn" onclick="adminClose()"><i class="ti ti-logout"></i> Salir</button>
      <div class="sel-logo"><img src="${LOGO_SEL}" alt="Hotel Copahue"></div>
      <div class="adm-hub">
        <h2 style="text-align:center;margin-bottom:4px">Panel de administraci\u00f3n</h2>
        <p style="text-align:center;font-size:12px;color:#6b5a32;margin-bottom:20px">Gestion\u00e1 el personal o entr\u00e1 directo a un \u00e1rea</p>
        <button class="hub-btn hub-main" onclick="adminPersonal()"><i class="ti ti-users"></i> Gesti\u00f3n de personal</button>
        <div class="hub-sep">o entrar directo a</div>
        <div class="hub-areas">
          <button class="hub-btn" onclick="adminGo('rec')"><span class="sel-emoji">\ud83d\udece\ufe0f</span>Recepci\u00f3n</button>
          <button class="hub-btn" onclick="adminGo('mu')"><span class="sel-emoji">\ud83e\udee7</span>Mucamas</button>
          <button class="hub-btn" onclick="adminGo('mant')"><span class="sel-emoji">\ud83d\udd27</span>Mantenimiento</button>
        </div>
      </div>
    </div>`;
    return;
  }
  if(UI.adminMode==='panel'){ document.getElementById("app").innerHTML=adminPanel(); return; }

  // names for selected area: users of that area + admins; mucamas come from D.mu
  let names='';
  if(A){
    let list=[];
    if(A==='mu'){ list=D.mu.map(m=>({id:m.id,nombre:m.nombre,clave:m.clave||''})); }
    else { list=D.users.filter(u=>u.area===A).map(u=>({id:u.id,nombre:u.nombre,clave:u.clave||''})); }
    // admins can enter any area
    names=list.map(p=>`<div class="sel-name ${UI.rolName===p.id?'on':''}" onclick="selN('${p.id}','${(p.nombre||'').replace(/'/g,"\\\\'")}')">${p.nombre}${p.adm?' \u2605':''}</div>`).join('');
    if(!list.length) names='<div style="font-size:12px;color:#6b5a32">A\u00fan no hay usuarios cargados en esta \u00e1rea. Ingres\u00e1 desde Admin.</div>';
  }
  const showN=!!A;
  const askClave=!!(A&&UI.rolName);
  document.getElementById("app").innerHTML=`
  <div class="sel-screen">
    <button class="adm-btn" onclick="adminOpen()"><i class="ti ti-shield-lock"></i> Admin</button>
    <div class="sel-logo"><img src="${LOGO_SEL}" alt="Hotel Copahue"></div>
    <div class="sel-cards">
      <div class="sel-card ${A==="rec"?"on":""}" onclick="selC('rec')"><span class="sel-emoji">\ud83d\udece\ufe0f</span><h3>Recepci\u00f3n</h3></div>
      <div class="sel-card ${A==="mu"?"on":""}" onclick="selC('mu')"><span class="sel-emoji">\ud83e\udee7</span><h3>Mucama</h3></div>
      <div class="sel-card ${A==="mant"?"on":""}" onclick="selC('mant')"><span class="sel-emoji">\ud83d\udd27</span><h3>Mantenimiento</h3></div>
    </div>
    ${showN?`<div class="sel-names"><h4>${A==='mu'?'\u00bfCu\u00e1l es tu nombre?':'Eleg\u00ed tu usuario'}</h4><div class="sel-names-row">${names}</div></div>`:""}
    ${askClave?`<div class="sel-clave"><h4>Clave de acceso</h4>
      <input id="rol-clave" class="adm-inp" style="max-width:140px;text-align:center;letter-spacing:6px;font-size:18px" type="password" inputmode="numeric" maxlength="2" placeholder="••" value="${UI.rolClave||''}" oninput="UI.rolClave=this.value;if(this.value.length===2)enterRole()">
      ${UI.rolErr?`<div style="color:#b91c1c;font-size:12px;margin-top:6px">${UI.rolErr}</div>`:''}
      <button class="sel-enter show" style="margin-top:14px" onclick="enterRole()">Ingresar \u2192</button></div>`:""}
  </div>`;
  if(askClave) setTimeout(()=>{var e=document.getElementById('rol-clave');if(e)e.focus();},50);
}
window.selC=c=>{UI.rolCard=c;UI.rolName=null;UI.rolClave='';UI.rolErr='';render();};
window.selN=(id,n)=>{UI.rolName=id;UI.rolNombre=n;UI.rolClave='';UI.rolErr='';render();};
window.enterRole=()=>{
  const A=UI.rolCard;
  // find selected person + clave
  let person=null;
  if(A==='mu') person=D.mu.find(m=>m.id===UI.rolName);
  if(!person) person=D.users.find(u=>u.id===UI.rolName);
  if(!person){UI.rolErr='Seleccion\u00e1 un usuario';render();return;}
  const clave=(UI.rolClave||'').trim();
  if((person.clave||'')!==clave){UI.rolErr='Clave incorrecta';UI.rolClave='';render();setTimeout(()=>{var e=document.getElementById('rol-clave');if(e)e.focus();},50);return;}
  ROLE=A;RID=person.id;RNAME=person.nombre;
  sessionStorage.setItem("ch_role",ROLE);
  sessionStorage.setItem("ch_rid",RID||"");
  sessionStorage.setItem("ch_rname",RNAME||"");
  // recepci\u00f3n: programar aviso de fin de turno si el usuario tiene turno
  UI.rolClave='';UI.rolErr='';UI.shiftDone=false;UI.shiftSnoozeTo=null;UI.shiftDismissed=false;
    render();
};
window.exitRole=()=>{
  ROLE="sel";sessionStorage.removeItem("ch_role");
  UI.rolCard=null;UI.rolName=null;UI.rolClave='';UI.rolErr='';UI.myShift=null;UI.shiftDone=false;render();
};

/* ===== ADMIN ===== */
const ADM_USER="33717567639", ADM_PASS="Copahue";
const AREA_MAX={rec:5,mu:8,mant:2,admin:3};
const AREA_LBL={rec:"Recepci\u00f3n",mu:"Mucamas",mant:"Mantenimiento",admin:"Administraci\u00f3n"};
window.adminOpen=()=>{UI.adminMode='login';UI.admU='';UI.admP='';UI.admErr='';render();};
window.adminClose=()=>{UI.adminMode=null;UI.admErr='';render();};
window.adminPersonal=()=>{UI.adminMode='panel';render();};
window.adminBack=()=>{UI.adminMode='hub';UI.uEdit=null;render();};
window.adminGo=(area)=>{
  ROLE=area;RID=null;RNAME='Admin';
  sessionStorage.setItem("ch_role",ROLE);sessionStorage.setItem("ch_rid","");sessionStorage.setItem("ch_rname","Admin");
  UI.adminMode=null;UI.shiftActive=false;UI.shiftDismissed=false;UI.shiftSnoozeTo=null;
  render();
};
window.adminCheck=()=>{
  if((UI.admU||'').trim()===ADM_USER&&(UI.admP||'')===ADM_PASS){UI.adminMode='hub';UI.admErr='';}
  else UI.admErr='Usuario o clave incorrectos';
  render();
};
function adminCount(area){ return area==='mu'?D.mu.length:D.users.filter(u=>u.area===area).length; }
function adminPanel(){
  const sec=area=>{
    const max=AREA_MAX[area];
    let rows;
    if(area==='mu') rows=D.mu.map(m=>({id:m.id,nombre:m.nombre,clave:m.clave||'',shift:null}));
    else rows=D.users.filter(u=>u.area===area).map(u=>({id:u.id,nombre:u.nombre,clave:u.clave||'',shift:u.shift||null}));
    const cnt=rows.length;
    const items=rows.map(r=>`<div class="adm-row">
      <div style="flex:1"><b>${r.nombre||'(sin nombre)'}</b> <span style="color:#9ca3af;font-size:11px">clave: ${r.clave?'\u2022\u2022':'\u2014'}</span></div>
      <button class="adm-mini" onclick="uEdit('${area}','${r.id}')"><i class="ti ti-pencil"></i></button>
      <button class="adm-mini" style="color:#b91c1c" onclick="uDel('${area}','${r.id}')"><i class="ti ti-trash"></i></button>
    </div>`).join('')||'<div style="font-size:12px;color:#9ca3af;padding:6px 0">Sin usuarios</div>';
    const canAdd=cnt<max;
    return `<div class="adm-sec">
      <div class="adm-sec-h"><h3>${AREA_LBL[area]}</h3><span class="adm-cnt">${cnt}/${max}</span></div>
      ${items}
      <button class="adm-add" ${canAdd?'':'disabled style="opacity:.4;cursor:not-allowed"'} onclick="${canAdd?`uNew('${area}')`:''}"><i class="ti ti-plus"></i> Agregar</button>
    </div>`;
  };
  const ed=UI.uEdit; // {area,id?,nombre,clave,ini,fin}

      <div class="fg"><span class="fl">Nombre</span><input class="fc" value="${(ed.nombre||'').replace(/"/g,'&quot;')}" oninput="UI.uEdit.nombre=this.value"></div>
      <div class="fg"><span class="fl">Clave (2 d\u00edgitos)</span><input class="fc" inputmode="numeric" maxlength="2" value="${(ed.clave||'').replace(/"/g,'&quot;')}" oninput="UI.uEdit.clave=this.value.replace(/[^0-9]/g,'').slice(0,2)"></div>
      ${ed.area==='rec'?`<div style="font-size:11px;color:#9ca3af;margin-top:4px">Recepci\u00f3n recibe el aviso de cambio de turno autom\u00e1ticamente a las 07, 15 y 23 hs.</div>`:''}

      </div>
      ${sec('rec')}${sec('mu')}${sec('mant')}
    </div>
    ${editor}
  </div>`;

window.adminExit=()=>{UI.adminMode=null;UI.uEdit=null;render();};
window.uNew=area=>{UI.uEdit={area:area,id:null,nombre:'',clave:''};UI.uErr='';render();};
window.uEdit=(area,id)=>{
  let src=area==='mu'?D.mu.find(m=>m.id===id):D.users.find(u=>u.id===id);
  if(!src)return;
  UI.uEdit={area:area,id:id,nombre:src.nombre||'',clave:src.clave||''};
  UI.uErr='';render();
};
window.uCancel=()=>{UI.uEdit=null;UI.uErr='';render();};
window.uDel=(area,id)=>{
  if(!confirm('\u00bfEliminar este usuario?'))return;
  if(area==='mu')D.mu=D.mu.filter(m=>m.id!==id),lsS(K.mu,D.mu);
  else D.users=D.users.filter(u=>u.id!==id),lsS(K.users,D.users);
  render();
};
window.uSave=()=>{
  const e=UI.uEdit;if(!e)return;
  if(!(e.nombre||'').trim()){UI.uErr='Pon\u00e9 un nombre';render();return;}
  if(!/^[0-9]{2}$/.test(e.clave||'')){UI.uErr='La clave debe tener 2 d\u00edgitos';render();return;}
  if(!e.id){ // nuevo: chequear l\u00edmite
    if(adminCount(e.area)>=AREA_MAX[e.area]){UI.uErr='L\u00edmite alcanzado para esta \u00e1rea';render();return;}
  }
  if(e.area==='mu'){
    if(e.id){D.mu=D.mu.map(m=>m.id===e.id?{...m,nombre:e.nombre.trim(),clave:e.clave}:m);}
    else{D.mu=[...D.mu,{id:uid(),nombre:e.nombre.trim(),clave:e.clave,entrada:'08:00',salida:'16:00',color:'#1d7a6b',cod:e.nombre.trim().slice(0,2).toUpperCase(),dias:[hoyISO()]}];}
    lsS(K.mu,D.mu);
  } else {
    if(e.id){D.users=D.users.map(u=>u.id===e.id?{...u,nombre:e.nombre.trim(),clave:e.clave}:u);}
    else{D.users=[...D.users,{id:uid(),area:e.area,nombre:e.nombre.trim(),clave:e.clave}];}
    lsS(K.users,D.users);
  }
  UI.uEdit=null;UI.uErr='';render();
};

    setTimeout(()=>{try{w.focus();w.print();}catch(e){}},700);
    return;
  }
  // 2) Respaldo: iframe oculto e imprimir directo su contenido
  let f=document.getElementById("pdf-frame");
  if(f)f.remove();
  f=document.createElement("iframe");
  f.id="pdf-frame";
  f.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0";
  document.body.appendChild(f);
  const doc=f.contentWindow.document;
  doc.open();doc.write(html);doc.close();
  setTimeout(()=>{try{f.contentWindow.focus();f.contentWindow.print();}catch(e){
    // 3) \u00daltimo respaldo: descargar el informe como archivo HTML
    try{const blob=new Blob([html],{type:"text/html"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="informe-diario.html";a.click();}catch(_){}
  }},800);
};

  const entry={t:Date.now(),who,desc,role:ROLE};

}

function vAuditView(){
  const pend=D.rooms.filter(r=>!r.audit).length;
  const total=D.rooms.length;
  const modoDe=r=>{
    if(r.audit==="ocup-cont"||r.audit==="ocup-sale"||r.audit==="ocup-pend")return "ocup";
    if(r.audit==="libre-limpia"||r.audit==="libre-sucia"||r.audit==="libre-pend")return "libre";
    return null;
  };
  const card=r=>{
    const modo=modoDe(r);
    const occHint=r.paxCheckin||r.ocupada||r.pax>0?"ocupada":"libre";
    return `<div class="aud-card2">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;color:${r.audit?auditColor(r.audit):'inherit'}">${r.num}</div>
        <div style="font-size:9px;color:var(--text2);font-weight:600">${(RD[r.num]||{}).cat||""} · hoy ${occHint}</div>
      </div>
      <div style="display:flex;gap:5px;margin-bottom:5px">
        <div class="aud-tog ${modo==="ocup"?"on-ocup":""}" onclick="setAuditMode('${r.id}','ocup')">Ocupada</div>
        <div class="aud-tog ${modo==="libre"?"on-libre":""}" onclick="setAuditMode('${r.id}','libre')">Libre</div>
      </div>
      ${modo==="ocup"?`<div style="display:flex;gap:5px">
        <div class="aud-sub ${r.audit==="ocup-cont"?"on":""}" style="--c:#d97706" onclick="setAudit('${r.id}','ocup-cont')">Repaso<br><span>continúa</span></div>
        <div class="aud-sub ${r.audit==="ocup-sale"?"on":""}" style="--c:#dc2626" onclick="setAudit('${r.id}','ocup-sale')">Limpieza<br><span>check-out</span></div>
      </div>`:modo==="libre"?`<div style="display:flex;gap:5px">
        <div class="aud-sub ${r.audit==="libre-limpia"?"on":""}" style="--c:#059669" onclick="setAudit('${r.id}','libre-limpia')">Control<br><span>limpia</span></div>
        <div class="aud-sub ${r.audit==="libre-sucia"?"on":""}" style="--c:#dc2626" onclick="setAudit('${r.id}','libre-sucia')">Limpieza<br><span>sucia</span></div>
      </div>`:`<div style="font-size:10px;color:var(--text3);text-align:center;padding:7px;font-weight:600">Elegí ocupada o libre</div>`}
    </div>`;
  };
  const col=(lbl,filt)=>`<div style="flex:1;min-width:0"><div class="fl-lbl" style="margin-bottom:10px;font-size:12px">${lbl}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">${D.rooms.filter(filt).map(card).join("")}</div></div>`;
  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div style="font-size:13px;color:var(--text2)">Marcá el estado real de cada habitación · <strong style="color:${pend?'#d97706':'#059669'}">${pend?pend+" sin revisar":"todas revisadas ✓"}</strong></div>
      <button class="btn btn-p btn-sm" onclick="UI.v='plan';render()"><i class="ti ti-check"></i> Volver a Limpiezas</button>
    </div>
    <div style="background:rgba(28,47,36,.06);border:1px solid var(--border);border-radius:14px;padding:11px 16px;font-size:11.5px;margin-bottom:16px;line-height:1.7">
      <strong>Ocupada</strong>: Repaso (sigue el pax) · Limpieza (check-out, va a Pendientes de liberar). &nbsp; <strong>Libre</strong>: Control (limpia) · Limpieza (sucia). Los estados se cargan solos en Limpiezas.
    </div>

      ${col("Piso 1",r=>fl1(r.num))}
      ${col("Piso 2",r=>fl2(r.num))}
      ${col("Piso 3",r=>fl3(r.num))}
    </div>
  </div>`;
}

function modHist(){
  const fmt=t=>{const d=new Date(t);return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"})+" "+d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});};
  const roleColor={rec:"#1d7a6b",mu:"#854f0b",mant:"#a32d2d"};
  const hist=D.hist||[];
  return `<div class="ov" onclick="closeMod(event)"><div class="mod" onclick="event.stopPropagation()" style="max-width:520px">
    <div class="mh"><div><h2><i class="ti ti-history"></i> Historial de cambios</h2><div class="mh-s">${hist.length} registro(s) · últimos primero</div></div><button class="btn btn-g btn-sm" onclick="closeMod()"><i class="ti ti-x"></i></button></div>
    <div class="mc" style="max-height:60vh;overflow-y:auto">
      ${hist.length?hist.map(h=>`<div style="display:flex;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${roleColor[h.role]||"#94a3b8"};margin-top:4px;flex-shrink:0"></div>
        <div style="flex:1"><div style="font-size:12px;color:#15151f">${h.desc}</div>

      </div>`).join(""):`<div style="text-align:center;color:#5e6b7e;padding:30px;font-size:12px">Sin cambios registrados aún</div>`}
    </div>

  </div></div>`;
}

window.togPaxIn=(id,val,e)=>{
  if(e)e.stopPropagation();
  const pax=Math.max(0,parseInt(val)||0);
  const _r=D.rooms.find(r=>r.id===id);if(_r)logChange("Hab "+_r.num+": check-in "+(_r.paxCheckin?"deshecho":"realizado"));
  D.rooms=D.rooms.map(r=>{

    return {...r,pax:pax>0?pax:(newIn?1:0),paxCheckin:newIn,ocupada:newIn};
  });
  lsS(K.rooms,D.rooms);render();
};
window.toggleOcupada=(id,e)=>{
  if(e)e.stopPropagation();
  const _to=D.rooms.find(r=>r.id===id);
  D.rooms=D.rooms.map(r=>{
    if(r.id!==id)return r;
    const newOcc=!(r.ocupada||r.paxCheckin||(r.audit==="ocup-cont"));
    // Ocupada → check-in (verde, mín 1 pax). Libre → sin check-in (rojo si tiene pax)
    return {...r,ocupada:newOcc,paxCheckin:newOcc,pax:newOcc?(r.pax>0?r.pax:1):r.pax};
  });
  lsS(K.rooms,D.rooms);if(_to)logChange("Hab "+_to.num+(_to.ocupada||_to.paxCheckin?" marcada libre":" marcada ocupada"));render();
};

window.cycleTarea=(id,e)=>{
  if(e)e.stopPropagation();
  const r=D.rooms.find(x=>x.id===id);if(!r)return;
  logChange("Hab "+r.num+": estado de limpieza cambiado");
  // Ciclo: Limpieza → Repaso → Control → Listo → Limpieza
  const allDone=r.tasks.L&&r.tasks.R&&r.tasks.C;
  let cur;
  if(allDone)cur="listo";
  else if(r.tarea==="limpiar"||["sucio","reservado","blancos-prog","blancos-libre"].includes(r.estado)&&!r.tarea)cur="limpiar";
  else if(r.tarea==="repasar"||r.estado==="en-proceso"&&!r.tarea)cur="repasar";
  else cur="controlar";
  const next={limpiar:"repasar",repasar:"controlar",controlar:"listo",listo:"limpiar"}[cur];
  D.rooms=D.rooms.map(x=>{
    if(x.id!==id)return x;
    if(next==="listo")return {...x,tarea:"controlar",tasks:{L:true,R:true,C:true}};
    return {...x,tarea:next,tasks:{L:false,R:false,C:false}};
  });
  lsS(K.rooms,D.rooms);render();
};

};

function playUrgentSound(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const beep=(freq,start,dur)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type="sine";
      g.gain.setValueAtTime(0,ctx.currentTime+start);
      g.gain.linearRampToValueAtTime(.18,ctx.currentTime+start+.03);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
    };
    beep(880,0,.18);beep(1100,.22,.22);
  }catch(e){}
}
window.setAuditMode=(id,modo)=>{D.rooms=D.rooms.map(r=>r.id===id?{...r,audit:modo==="ocup"?(r.audit==="ocup-sale"?"ocup-sale":"ocup-pend"):(r.audit==="libre-sucia"?"libre-sucia":"libre-pend")}:r);render();};
window.setAudit=(id,val)=>{
  D.rooms=D.rooms.map(r=>{
    if(r.id!==id)return r;
    let estado=r.estado,tarea=r.tarea,ocupada=r.ocupada,paxCheckin=r.paxCheckin,checkout=false,pax=r.pax;
    if(val==="ocup-cont"){ // huésped sigue → repaso
      estado="en-proceso";tarea="repasar";ocupada=true;paxCheckin=true;if(pax<1)pax=1;checkout=false;
    }else if(val==="ocup-sale"){ // checkout → limpieza
      estado="sucio";tarea="limpiar";ocupada=true;paxCheckin=true;if(pax<1)pax=1;checkout=true;
    }else if(val==="libre-limpia"){ // libre limpia → control
      estado="en-proceso";tarea="controlar";ocupada=false;paxCheckin=false;pax=0;checkout=false;
    }else if(val==="libre-sucia"){ // libre sucia → limpieza
      estado="sucio";tarea="limpiar";ocupada=false;paxCheckin=false;pax=0;checkout=false;
    }
    return {...r,audit:val,estado,tarea,ocupada,paxCheckin,pax,checkout,liberada:false,tasks:{L:false,R:false,C:false}};
  });
  lsS(K.rooms,D.rooms);
  const _r=D.rooms.find(r=>r.id===id);if(_r)logChange("Auditoría Hab "+_r.num+": "+{["ocup-cont"]:"continúa (repaso)",["ocup-sale"]:"check-out (limpieza)",["libre-limpia"]:"libre limpia (control)",["libre-sucia"]:"libre sucia (limpieza)"}[val]);
  render();
};

  if(!D.mchk[day])D.mchk[day]={};
  D.mchk[day][key]=val;lsS(K.mchk,D.mchk);
};

function removeShiftPopup(){var e=document.getElementById('shift-pop');if(e)e.remove();}

window.shiftSnooze=function(min){UI.shiftSnoozeTo=Date.now()+min*60000;removeShiftPopup();};
window.shiftDismiss=function(){UI.shiftActive=false;UI.shiftDismissed=true;removeShiftPopup();};
window.checkShift=function(){
  if(ROLE!=='rec'){removeShiftPopup();return;}
  var now=new Date(), h=now.getHours(), m=now.getMinutes();
  if((h===7||h===15||h===23)&&m===0){
    var key=now.toDateString()+'-'+h;
    if(UI.shiftFiredKey!==key){UI.shiftFiredKey=key;UI.shiftActive=true;UI.shiftSnoozeTo=null;UI.shiftDismissed=false;}
  }
  if(UI.shiftActive&&!UI.shiftDismissed){
    if(UI.shiftSnoozeTo&&Date.now()<UI.shiftSnoozeTo) removeShiftPopup();
    else showShiftPopup();
  } else removeShiftPopup();
};
setInterval(function(){try{checkShift();}catch(e){}},20000);

// ══ LIQUID GLASS — destello de agua siguiendo el cursor ══════════════════════
(function(){
  const SEL=".card,.rc,.btn,.pp-card,.nb,.fb,.sel-card,.audit-card,.mu-card,.task-card,.iss-card,.sc,.ps,.stat-box,.lib-card";
  let raf=null;
  function onMove(e){
    const t=e.target.closest(SEL);
    if(!t)return;
    if(raf)return;
    raf=requestAnimationFrame(()=>{
      raf=null;
      const r=t.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width);
      const y=((e.clientY-r.top)/r.height);
      // Water sheen position
      t.style.setProperty("--mx",(x*100).toFixed(1)+"%");
      t.style.setProperty("--my",(y*100).toFixed(1)+"%");
      t.classList.add("lg-active");
    });
  }
  function onLeave(e){
    const t=e.target.closest(SEL);
    if(!t)return;
    t.classList.remove("lg-active");
  }
  document.addEventListener("mousemove",onMove,{passive:true});
  document.addEventListener("mouseout",onLeave,{passive:true});
})();

window.addEventListener("storage",e=>{if(e.key&&e.key.startsWith("ch_")){loadD();render();}});
setInterval(syncCheck,3000);
lastV=+lsG(K.ver,0);

</script>
